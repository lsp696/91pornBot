spring:
  profiles:
    active: prod

server:
  tomcat:
    acceptCount: 700
    max-connections: 20000
    max-threads: 60
    min-spare-threads: 100
    uri-encoding: UTF-8

myappconfig:
  proxy_on: true
  ffmpeg_root: "/usr/bin/"
  mp4box_root: "/usr/local/bin/MP4Box"
  fileroot: "/video/"
  chat_id: "PLACEHOLDER"
  bot_token: "PLACEHOLDER"

logging:
  file:
    path: /video/
    name: 91porn.log
  level:
    root: info
